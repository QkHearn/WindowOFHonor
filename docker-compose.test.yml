services:
  postgres-test:
    image: postgres:16-alpine
    container_name: woh-postgres-test
    environment:
      POSTGRES_USER: honor_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: windowofhonor_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U honor_test -d windowofhonor_test']
      interval: 5s
      timeout: 3s
      retries: 10
